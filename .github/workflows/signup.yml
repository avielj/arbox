name: 🏋️ Arbox Auto-Signup

on:
  # Run daily at 06:01 UTC (same as crontab)
  schedule:
    - cron: '1 6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no signups)'
        required: false
        default: 'false'
        type: boolean

jobs:
  signup:
    runs-on: ubuntu-latest

    # Needed by the keepalive step to push a dummy commit that resets
    # GitHub's 60-day scheduled-workflow inactivity timer.
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v5

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: 🔐 Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.ARBOX_EMAIL }}" ] && missing="$missing ARBOX_EMAIL"
          [ -z "${{ secrets.ARBOX_PASSWORD }}" ] && missing="$missing ARBOX_PASSWORD"
          [ -z "${{ secrets.SIGNUP_HOUR }}" ] && missing="$missing SIGNUP_HOUR"
          [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && missing="$missing TELEGRAM_BOT_TOKEN"
          [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ] && missing="$missing TELEGRAM_CHAT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Go to Settings → Secrets and variables → Actions to add them."
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: 📝 Create .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          ARBOX_EMAIL=__ARBOX_EMAIL__
          ARBOX_PASSWORD=__ARBOX_PASSWORD__
          SIGNUP_HOUR=__SIGNUP_HOUR__
          TELEGRAM_BOT_TOKEN=__TELEGRAM_BOT_TOKEN__
          TELEGRAM_CHAT_ID=__TELEGRAM_CHAT_ID__
          DAYS_AHEAD=__DAYS_AHEAD__
          CLASS_FRIDAY=__CLASS_FRIDAY__
          CLASS_DEFAULT=__CLASS_DEFAULT__
          SKIP_DAYS=__SKIP_DAYS__
          ENVEOF
          sed -i 's/^          //' .env
          sed -i "s|__ARBOX_EMAIL__|${{ secrets.ARBOX_EMAIL }}|" .env
          sed -i "s|__ARBOX_PASSWORD__|${{ secrets.ARBOX_PASSWORD }}|" .env
          sed -i "s|__SIGNUP_HOUR__|${{ secrets.SIGNUP_HOUR }}|" .env
          sed -i "s|__TELEGRAM_BOT_TOKEN__|${{ secrets.TELEGRAM_BOT_TOKEN }}|" .env
          sed -i "s|__TELEGRAM_CHAT_ID__|${{ secrets.TELEGRAM_CHAT_ID }}|" .env
          sed -i "s|__DAYS_AHEAD__|${{ vars.DAYS_AHEAD || '12' }}|" .env
          sed -i "s|__CLASS_FRIDAY__|${{ vars.CLASS_FRIDAY || 'Fuck You Friday' }}|" .env
          sed -i "s|__CLASS_DEFAULT__|${{ vars.CLASS_DEFAULT || 'CrossFit' }}|" .env
          sed -i "s|__SKIP_DAYS__|${{ vars.SKIP_DAYS || 'Saturday' }}|" .env

      - name: 🔑 Restore membership cache
        uses: actions/cache@v5
        with:
          path: .arbox_cache
          key: arbox-cache-${{ secrets.ARBOX_EMAIL }}

      - name: 🏋️ Run signup script
        run: |
          chmod +x arbox-signup.sh
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          ./arbox-signup.sh $FLAGS

      - name: 📊 Show results
        if: always()
        run: |
          echo "=== Last 30 log lines ==="
          tail -30 sign.log 2>/dev/null || echo "No log file"
          echo ""
          echo "=== Cache ==="
          cat .arbox_cache 2>/dev/null || echo "No cache file"

      # Keeps this scheduled workflow alive. GitHub disables cron workflows
      # after 60 days of repository inactivity; this creates a dummy commit
      # only when the repo is close to that limit, resetting the timer.
      - name: ♻️ Keepalive
        if: always()
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 45
