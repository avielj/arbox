name: 🏋️ Arbox Auto-Signup

on:
  # Run daily at 06:01 UTC (same as crontab)
  schedule:
    - cron: '1 6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no signups)'
        required: false
        default: 'false'
        type: boolean

jobs:
  signup:
    runs-on: ubuntu-latest

    # Needed by the keepalive step to push a dummy commit that resets
    # GitHub's 60-day scheduled-workflow inactivity timer.
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v5

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: 🔐 Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.ARBOX_EMAIL }}" ] && missing="$missing ARBOX_EMAIL"
          [ -z "${{ secrets.ARBOX_PASSWORD }}" ] && missing="$missing ARBOX_PASSWORD"
          [ -z "${{ secrets.SIGNUP_HOUR }}" ] && missing="$missing SIGNUP_HOUR"
          [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && missing="$missing TELEGRAM_BOT_TOKEN"
          [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ] && missing="$missing TELEGRAM_CHAT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Go to Settings → Secrets and variables → Actions to add them."
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: 📝 Create .env from secrets
        # Secrets are passed through env vars (not interpolated into the
        # script body) so values containing |, &, \, $ etc. are handled
        # safely and aren't exposed to shell/script injection.
        env:
          ARBOX_EMAIL: ${{ secrets.ARBOX_EMAIL }}
          ARBOX_PASSWORD: ${{ secrets.ARBOX_PASSWORD }}
          SIGNUP_HOUR: ${{ secrets.SIGNUP_HOUR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAYS_AHEAD: ${{ vars.DAYS_AHEAD || '12' }}
          CLASS_FRIDAY: ${{ vars.CLASS_FRIDAY || 'Fuck You Friday' }}
          CLASS_DEFAULT: ${{ vars.CLASS_DEFAULT || 'CrossFit' }}
          SKIP_DAYS: ${{ vars.SKIP_DAYS || 'Saturday' }}
        run: |
          {
            printf 'ARBOX_EMAIL=%s\n'        "$ARBOX_EMAIL"
            printf 'ARBOX_PASSWORD=%s\n'     "$ARBOX_PASSWORD"
            printf 'SIGNUP_HOUR=%s\n'        "$SIGNUP_HOUR"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
            printf 'TELEGRAM_CHAT_ID=%s\n'   "$TELEGRAM_CHAT_ID"
            printf 'DAYS_AHEAD=%s\n'         "$DAYS_AHEAD"
            printf 'CLASS_FRIDAY=%s\n'       "$CLASS_FRIDAY"
            printf 'CLASS_DEFAULT=%s\n'      "$CLASS_DEFAULT"
            printf 'SKIP_DAYS=%s\n'          "$SKIP_DAYS"
          } > .env

      - name: 🔑 Restore membership cache
        uses: actions/cache@v5
        with:
          path: .arbox_cache
          key: arbox-cache-${{ secrets.ARBOX_EMAIL }}

      - name: 🏋️ Run signup script
        run: |
          chmod +x arbox-signup.sh
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          ./arbox-signup.sh $FLAGS

      - name: 📊 Show results
        if: always()
        run: |
          echo "=== Last 30 log lines ==="
          tail -30 sign.log 2>/dev/null || echo "No log file"
          echo ""
          echo "=== Cache ==="
          cat .arbox_cache 2>/dev/null || echo "No cache file"

      # Keeps this scheduled workflow alive. GitHub disables cron workflows
      # after 60 days of repository inactivity; this creates a dummy commit
      # only when the repo is close to that limit, resetting the timer.
      - name: ♻️ Keepalive
        if: always()
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 45
